spring:
  datasource:
    url: jdbc:h2:mem:fibankdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driverClassName: org.h2.Driver
    username: sa
    password: 
  h2:
    console:
      enabled: true
      path: /h2-console
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  threads:
    virtual:
      enabled: true

fx:
  rate:
    usd-to-eur: 0.86
    eur-to-usd: 1.16

fib:
  auth:
    api-key: ${FIB_API_KEY:default-dev-key}